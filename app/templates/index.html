<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application ML - Prédiction de Churn</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 40px; text-align: center; }
        .container { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        form { display: flex; flex-direction: column; text-align: left; }
        label { margin-top: 15px; font-weight: bold; color: #555; }
        input { padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { margin-top: 25px; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 25px; font-size: 18px; font-weight: bold; padding: 15px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔮 Prédiction de Churn</h2>
        <p>Entrez les données du client pour simuler le modèle ML.</p>

        <form action="/predict" method="post">
            <label>Âge du client :</label>
            <input type="number" name="Age" required placeholder="Ex: 35">
            
            <label>Tickets de support ouverts :</label>
            <input type="number" name="SupportTickets" required placeholder="Ex: 2">
            
            <label>Total Dépensé (MonetaryTotal) :</label>
            <input type="number" step="0.01" name="MonetaryTotal" required placeholder="Ex: 250.50">
            
            <label>Fréquence d'achat (Frequency) :</label>
            <input type="number" name="Frequency" required placeholder="Ex: 5">
            
            <button type="submit">Lancer la prédiction</button>
        </form>

        {% if prediction_text %}
            <div class="result" style="color: white; background-color: {{ text_color }};">
                {{ prediction_text }}
            </div>
        {% endif %}
    </div>

</body>
</html>
